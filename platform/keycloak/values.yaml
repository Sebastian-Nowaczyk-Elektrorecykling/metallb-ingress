production: true
proxyHeaders: xforwarded
hostnameStrict: false
httpEnabled: true
replicaCount: 1

resourcesPreset: small

auth:
  adminUser: admin
  existingSecret: keycloak-admin
  passwordSecretKey: admin-password

postgresql:
  enabled: false
externalDatabase:
  host: keycloak-db-rw.keycloak.svc.cluster.local
  port: 5432
  user: keycloak
  database: keycloak
  existingSecret: keycloak-db-app
  existingSecretUserKey: username
  existingSecretPasswordKey: password

ingress:
  enabled: true
  ingressClassName: nginx
  hostname: auth.home.arpa
  path: /
  pathType: Prefix
  tls: true
  extraTls:
    - hosts:
        - auth.home.arpa
      secretName: keycloak-tls

metrics:
  enabled: false

keycloakConfigCli:
  enabled: true
  backoffLimit: 8
  configuration:
    home.yaml: |
      realm: home
      displayName: Home
      enabled: true
      registrationAllowed: false
      loginWithEmailAllowed: true
      duplicateEmailsAllowed: false
      resetPasswordAllowed: true
      editUsernameAllowed: false
      sslRequired: external

      groups:
        - name: argocd-admins
        - name: argocd-readonly
        - name: gitea-admins
        - name: gitea-users
        - name: ceph-dashboard-users

      clientScopes:
        - name: groups
          description: Group membership claim for homelab applications
          protocol: openid-connect
          attributes:
            include.in.token.scope: "true"
            display.on.consent.screen: "true"
          protocolMappers:
            - name: groups
              protocol: openid-connect
              protocolMapper: oidc-group-membership-mapper
              consentRequired: false
              config:
                claim.name: groups
                full.path: "false"
                id.token.claim: "true"
                access.token.claim: "true"
                userinfo.token.claim: "true"
                multivalued: "true"

      clients:
        - clientId: argocd
          name: Argo CD
          description: Argo CD SSO client
          enabled: true
          protocol: openid-connect
          publicClient: false
          clientAuthenticatorType: client-secret
          secret: zS7gNIED4ql_8TWyB4VtmmXTKthLPFWRWJA3bYlGRQ2Wd4ujfdMINYE_xhheFR7b
          standardFlowEnabled: true
          directAccessGrantsEnabled: true
          serviceAccountsEnabled: false
          fullScopeAllowed: true
          redirectUris:
            - https://argocd.home.arpa/auth/callback
            - https://argocd.home.arpa/api/dex/callback
          webOrigins:
            - https://argocd.home.arpa
          defaultClientScopes:
            - web-origins
            - acr
            - profile
            - roles
            - email
            - groups
          optionalClientScopes:
            - address
            - phone
            - offline_access
            - microprofile-jwt

        - clientId: gitea
          name: Gitea
          description: Gitea SSO client for the gitops-gitea instance
          enabled: true
          protocol: openid-connect
          publicClient: false
          clientAuthenticatorType: client-secret
          secret: n66u5xJQ-sY6f7GmjQfu3Yy1qwRe4iqK6Zb-18S1wMXrnFR2LWWxqV9con_cp0a_
          standardFlowEnabled: true
          directAccessGrantsEnabled: false
          serviceAccountsEnabled: false
          fullScopeAllowed: true
          redirectUris:
            - https://git.home.arpa/user/oauth2/keycloak/callback
          webOrigins:
            - https://git.home.arpa
          defaultClientScopes:
            - web-origins
            - acr
            - profile
            - roles
            - email
            - groups
          optionalClientScopes:
            - address
            - phone
            - offline_access
            - microprofile-jwt

        - clientId: ceph-dashboard
          name: Ceph Dashboard OAuth2 Proxy
          description: OAuth2 Proxy client protecting the Rook/Ceph dashboard
          enabled: true
          protocol: openid-connect
          publicClient: false
          clientAuthenticatorType: client-secret
          secret: R54-zXEQ-18aTj1jwcx31sD5dJdSZtXAiwaCrvsD9MvKnmrA9YTI-XZDlkKKewUZ
          standardFlowEnabled: true
          directAccessGrantsEnabled: false
          serviceAccountsEnabled: false
          fullScopeAllowed: true
          redirectUris:
            - https://ceph.home.arpa/oauth2/callback
          webOrigins:
            - https://ceph.home.arpa
          defaultClientScopes:
            - web-origins
            - acr
            - profile
            - roles
            - email
            - groups
          optionalClientScopes:
            - address
            - phone
            - offline_access
            - microprofile-jwt
