apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-db
  namespace: gitops-gitea
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  primaryUpdateStrategy: unsupervised
  storage:
    size: 20Gi
    storageClass: rook-ceph-block
  bootstrap:
    initdb:
      database: gitea
      owner: gitea
      secret:
        name: gitea-db-app
  monitoring:
    enablePodMonitor: false
