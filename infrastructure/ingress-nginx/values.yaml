controller:
  ingressClassResource:
    name: nginx
    enabled: true
    default: true
  service:
    type: LoadBalancer
    externalTrafficPolicy: Cluster
    annotations:
      metallb.io/loadBalancerIPs: "192.168.15.1"
  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
