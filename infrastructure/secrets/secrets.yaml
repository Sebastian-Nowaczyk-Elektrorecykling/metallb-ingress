# Plain Kubernetes Secrets are included so the repository is complete and easy to test.
# Before committing to a shared/private Git host, replace these placeholders using
# scripts/generate-secrets.sh and preferably encrypt this file with SOPS/age or Sealed Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: keycloak
type: Opaque
stringData:
  admin-password: CHANGE_ME_KEYCLOAK_ADMIN_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-app
  namespace: keycloak
type: kubernetes.io/basic-auth
stringData:
  username: keycloak
  password: CHANGE_ME_KEYCLOAK_DB_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-db-app
  namespace: gitops-gitea
type: kubernetes.io/basic-auth
stringData:
  username: gitea
  password: CHANGE_ME_GITEA_DB_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-admin
  namespace: gitops-gitea
type: Opaque
stringData:
  username: gitea_admin
  email: admin@apps.example.lan
  password: CHANGE_ME_GITEA_ADMIN_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-oidc
  namespace: gitops-gitea
type: Opaque
stringData:
  key: gitea
  secret: CHANGE_ME_GITEA_OIDC_CLIENT_SECRET
---
apiVersion: v1
kind: Secret
metadata:
  name: ceph-dashboard-oauth2-proxy
  namespace: rook-ceph
type: Opaque
stringData:
  client-id: ceph-dashboard
  client-secret: CHANGE_ME_CEPH_DASHBOARD_OIDC_CLIENT_SECRET
  cookie-secret: CHANGE_ME_CEPH_DASHBOARD_OAUTH2_COOKIE_SECRET
